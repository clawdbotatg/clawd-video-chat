    // Drop pending tool/thinking; keep ack and real.
    _ttsQueue = _ttsQueue.filter(it => it.kind === "real" || it.kind === "ack");
    // Soft-cut tool/thinking mid-playback: give 1.5s grace, then hard-cut.
    // Ack is exempt — it's short and the user wants to hear it.
    if (_ttsAudio && (_ttsAudio.__kind === "tool" || _ttsAudio.__kind === "thinking")) {
      const audio = _ttsAudio;
      setTimeout(() => {
        if (_ttsAudio === audio) {
          try { audio.pause(); } catch {}
          if (_ttsResolveCurrent) { const r = _ttsResolveCurrent; _ttsResolveCurrent = null; r(); }
        }
      }, 1500);
    }
  }
  ttsDrainQueue();
}

// ── Filler / Haiku stall-talk ──────────────────────────────────────────────
// Calls /api/filler (Bankr → claude-haiku-4.5) for a quick 1-line voice line
// while the main model is still composing. Three kinds:
//   - ack:      fired once on user-send. Just acknowledges, never answers.
//   - tool:     fired on agent.tool start. Narrates what it's about to do.
//   - thinking: fired (debounced) on agent.thinking deltas. Paraphrases.
// Skipped silently if real text has already started or another filler is
// already in flight (we don't want stacking — ack already covers most stalls).
// Trace for the ack pipeline. Quiet by default; set window.__clawdDebug=true
// in the console to re-enable. Prefix is searchable: "[clawd-ack]".
let _ackTraceStart = 0;
function ackTrace(...args) {
  if (!window.__clawdDebug) return;
  const dt = _ackTraceStart ? `+${Date.now() - _ackTraceStart}ms` : "0ms";
  console.log(`%c[clawd-ack ${dt}]`, "color:#ff8855;font-weight:bold", ...args);
}

async function fillerSpeak({ kind, lastUser, toolName, toolInput, thinkingText, history }) {
  if (kind === "ack") { _ackTraceStart = Date.now(); ackTrace("fillerSpeak ENTER", { ttsEnabled: _ttsEnabled, ttsMode: _ttsMode, realArrived: _ttsRealArrived, realAudioStarted: _ttsRealAudioStarted, ackWindowOpen: _ackWindowOpen, fillerInflight: _fillerInflight }); }
  if (!_ttsEnabled) { if (kind === "ack") ackTrace("DROP: tts disabled"); return; }
  if (_ttsMode === "browser") { if (kind === "ack") ackTrace("DROP: tts mode is browser (no /api/tts pipeline)"); return; }
  // Entry guards (per-kind):
  //   - ack:               only blocked if real audio already started playing
  //   - tool / thinking:   blocked once real has arrived OR another filler is in flight
  if (kind === "ack") {
    if (_ttsRealAudioStarted) { ackTrace("DROP: real audio already started before ack fired"); return; }
  } else {
    if (_ttsRealArrived) return;
    if (_fillerInflight > 0) return;
  }
  const turnId = _ttsTurnId;
  _fillerInflight++;
  const ac = new AbortController();
  _ttsAborts.push(ac);
  try {
    if (kind === "ack") ackTrace("fetching /api/filler");
    const res = await fetch("/api/filler", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ kind, lastUser, toolName, toolInput, thinkingText, history }),
      signal: ac.signal,
    });
    if (kind === "ack") ackTrace("fetch returned", { ok: res.ok, status: res.status });
    if (!res.ok) {
      if (kind === "ack") ackTrace("DROP: HTTP not ok", res.status);
      else if (window.__clawdDebug) console.warn("[filler]", kind, "HTTP", res.status);
      return;
    }
    const data = await res.json();
    if (kind === "ack") ackTrace("response parsed", { text: data?.text, error: data?.error });
    if (turnId !== _ttsTurnId || !_ttsEnabled) { if (kind === "ack") ackTrace("DROP: turnId mismatch or tts disabled"); return; }
    // Exit guards mirror entry guards (state may have advanced during fetch).
    if (kind === "ack" ? _ttsRealAudioStarted : _ttsRealArrived) {
      if (kind === "ack") ackTrace("DROP post-fetch: realAudioStarted=true (real audio began playing during ack fetch)");
      return;
    }
    const text = (data?.text || "").trim();
    if (!text) { if (kind === "ack") ackTrace("DROP: empty text from /api/filler"); return; }
    if (kind === "ack") ackTrace("calling ttsEnqueue", text);
    ttsEnqueue(text, kind);   // kind passes through: "ack" | "tool" | "thinking"
    if (kind === "ack") ackTrace("ttsEnqueue returned, queue length now", _ttsQueue.length);
  } catch (e) {
    if (kind === "ack") ackTrace("DROP: exception", e.name, e.message);
    else if (e.name !== "AbortError" && window.__clawdDebug) console.warn("[filler]", e.message);
  } finally {
    _fillerInflight = Math.max(0, _fillerInflight - 1);
    const i = _ttsAborts.indexOf(ac);
    if (i >= 0) _ttsAborts.splice(i, 1);
    if (kind === "ack") {
      // Always close the ack window when the ack request settles — success,
      // skip, or error. Buffered real text gets to play.
      ackTrace("calling closeAckWindow from finally");
      closeAckWindow("ack-settled");
    }
  }
}

// Open a brief "ack window" right after the user submits. While it's open,
// real text deltas are buffered so the ack reliably plays first. Closes
// when the ack lands (fillerSpeak success), the ack fails, or _ACK_WINDOW_MS
// elapses — whichever comes first. After close, any buffered ttsFeed call
// is replayed exactly once with the latest cumulative text.
function openAckWindow() {
  _ackWindowOpen = true;
  clearTimeout(_ackWindowTimer);
  _ackWindowTimer = setTimeout(() => { ackTrace("ack window TIMEOUT (haiku slower than 2.5s)"); closeAckWindow("timeout"); }, _ACK_WINDOW_MS);
  ackTrace("openAckWindow");
}
function closeAckWindow(reason) {
  if (!_ackWindowOpen) return;
  _ackWindowOpen = false;
  clearTimeout(_ackWindowTimer);
  _ackWindowTimer = null;
  ackTrace("closeAckWindow", reason, "pendingTtsFeed:", !!_ackPendingTtsFeed);
  if (_ackPendingTtsFeed) {
    const { fullText, isFinal } = _ackPendingTtsFeed;
    _ackPendingTtsFeed = null;
    ttsFeed(fullText, isFinal);   // window now closed — falls through to normal path
  }
}

// Touching clawd-md / CLAUDE.md / .claude / workspace-clawd files is the
// assistant looking at its own instructions — *thinking*, not doing work.
// Match ANY tool whose input mentions one of these paths (Read file_path,
// Bash `cat`/`head`/`grep`, etc.). We just check for the path substring;
// no need to enumerate command shapes.
const _BRAIN_PATH_RE = /(clawd-md\/|claude\.md|\.claude\/|workspace-clawd\/)/i;
const _BRAIN_SOUNDS = ["Hmm.", "Hmmm.", "Mmm.", "Hrmm.", "Hm, lemme see.", "Mm-hmm.", "Mmm, okay."];
function isBrainFileRead(toolName, toolInput) {
  let inputStr = "";
  try {
    inputStr = typeof toolInput === "string" ? toolInput : JSON.stringify(toolInput || {});
  } catch { inputStr = String(toolInput || ""); }
  return _BRAIN_PATH_RE.test(inputStr);
}
function pickBrainSound() {
  return _BRAIN_SOUNDS[Math.floor(Math.random() * _BRAIN_SOUNDS.length)];
}

// Short messages and bare greetings don't need an ack — the model will
// answer almost as fast as Haiku could stall, and the ack ends up echoing
// the greeting back ("gm let me think" feels like an answer, not a stall).
const _GREETING_RE = /^(gm|gn|gn8|good\s+(morning|night|evening|afternoon|day)|hi|hello|hey|howdy|sup|yo|hiya|greetings|hola|aloha|ok|k|kk|okay|thanks|thx|ty|cool|nice|great|got\s*it|cheers|bye|cya|night|morning)\b[!.?\s]*$/i;
function shouldSkipAck(text) {
  const t = (text || "").trim();
  if (t.length < 10) return true;       // too short to bother
  if (_GREETING_RE.test(t)) return true; // bare greeting
  return false;
}

// Pull the last few user/assistant turns from the DOM as bare text — keeps
// the Haiku context tight. Each entry: {role, content}.
function fillerHistorySnapshot(tab, n = 3) {
  if (!tab || !tab.paneEl) return [];
  const out = [];
  const msgs = tab.paneEl.querySelectorAll(".msg.user, .msg.assistant");
  const take = Math.min(msgs.length, n * 2);
  for (let i = msgs.length - take; i < msgs.length; i++) {
    const m = msgs[i];
    const role = m.classList.contains("user") ? "user" : "assistant";
    const body = m.querySelector(".text") || m.querySelector(".body");
    const content = (body?.textContent || "").trim().slice(0, 400);
    if (content) out.push({ role, content });
  }
  return out;
}

// First chunk: split on any pause (',' ';' ':' '.' '!' '?' '\n') for fast first-audio.
// Later chunks: full sentence boundary only, for smoother delivery.
const _TTS_FIRST_RE = /^([\s\S]*?[.,!?;:\n])\s/;
const _TTS_SENT_RE  = /^([\s\S]*?[.!?\n])\s/;
// Hard cap so a long unbroken stream doesn't stall forever.
const _TTS_MAX_CHUNK = 240;

function ttsFeed(fullText, isFinal) {
  if (!_ttsEnabled) return;
  // Hold real text while we're waiting for the ack to land. We only stash
  // the latest cumulative {fullText, isFinal} — closeAckWindow replays it.
  if (_ackWindowOpen) {
    if (!_ackPendingTtsFeed) ackTrace("ttsFeed: BUFFERING real text (window open)", fullText.slice(0, 60));
    _ackPendingTtsFeed = { fullText, isFinal };
    _ttsTurnFullText = fullText;   // keep video sync up to date even while deferred
    return;
  }
  _ttsTurnFullText = fullText;
  if (_ttsMode !== "browser") {
    while (true) {
      const newPart = fullText.slice(_ttsSpokenUpTo);
      if (!newPart) return;
      if (isFinal) {
        ttsEnqueue(newPart);
        _ttsSpokenUpTo = fullText.length;
        _ttsChunkIndex++;
        return;
      }
      const re = _ttsChunkIndex === 0 ? _TTS_FIRST_RE : _TTS_SENT_RE;
      const m = newPart.match(re);
      if (m) {
        ttsEnqueue(m[1]);
        _ttsSpokenUpTo += m[0].length;
        _ttsChunkIndex++;
        continue;            // try to drain more boundaries from same buffer
      }
      if (newPart.length >= _TTS_MAX_CHUNK) {
        const cut = newPart.lastIndexOf(" ", _TTS_MAX_CHUNK);
        const split = cut > 40 ? cut : _TTS_MAX_CHUNK;
        ttsEnqueue(newPart.slice(0, split));
        _ttsSpokenUpTo += split;
        _ttsChunkIndex++;
        continue;
      }
      return;                // wait for more text
    }
  }
  // ── Browser SpeechSynthesis fallback (unchanged behavior) ──
  // If we got here in clawd-video-chat it means _ttsMode === "browser",
  // i.e. the server reported ttsBackend:none. That should never happen
  // when ELEVENLABS_API_KEY is set — surface it loudly so the bug is
  // visible at a glance, not buried in console.
  console.warn("[clawd-video-chat] BROWSER TTS FALLBACK — _ttsMode is 'browser', ElevenLabs not in use.");
  if (typeof flashBrowserFallbackWarning === "function") flashBrowserFallbackWarning();
  const newPart = fullText.slice(_ttsSpokenUpTo);
  if (!newPart) return;
  function mkUtt(text) {
    const utt = new SpeechSynthesisUtterance(ttsStrip(text));
    utt.rate = 1.25;
    utt.onstart = () => { clearTimeout(_ttsIdleTimer); clawdVid.chatting(_ttsTurnFullText); };
    utt.onend   = () => { _ttsIdleTimer = setTimeout(() => clawdVid.idle(true), 250); };
    return utt;
  }
  if (isFinal) {
    const rem = newPart.trim();
    if (rem) speechSynthesis.speak(mkUtt(rem));
    _ttsSpokenUpTo = fullText.length;
    return;
  }
  const m = newPart.match(/([\s\S]*[.!?\n])\s*/);
  if (m) {
    const toSpeak = m[1].trim();
    if (toSpeak) speechSynthesis.speak(mkUtt(toSpeak));
    _ttsSpokenUpTo += m[0].length;
  }
}

function applyTtsState() {
  $btnSpeak.classList.toggle("active", _ttsEnabled);
  $btnSpeak.textContent = _ttsEnabled ? "🔊" : "🔇";
  const label = _ttsMode === "elevenlabs" ? "ElevenLabs"
              : _ttsMode === "openai" ? "Onyx"
              : "TTS";
  $btnSpeak.title = _ttsEnabled ? `${label} on — click to mute` : `${label} off — click to enable`;
}
applyTtsState();

$btnSpeak.addEventListener("click", () => {
  _ttsEnabled = !_ttsEnabled;
  localStorage.setItem("clawd.tts", _ttsEnabled ? "1" : "0");
  applyTtsState();
  if (!_ttsEnabled) ttsReset();
});

// ── Always-listening wake-word loop ────────────────────────────────────────
// Replaces the push-to-talk mic in clawd-web-chat. The recognizer runs
// continuously and we scan finalized chunks for a wake phrase ("okay claude",
// "ok clod", and a few common mishearings). Once we hear it, we capture the
// trailing utterance (+ anything that arrives in the next ~SILENCE_MS of
// quiet) and submit it via the existing onSend() path so all the streaming /
// TTS / avatar plumbing stays identical.
//
// Echo immunity: while clawd is speaking, _ttsAudio is non-null. We ignore
// any final results during that window plus a short tail, so clawd's own
// voice can't trigger the wake word.

const $btnMic = document.getElementById("btnMic");
const $statusPill = document.getElementById("status-pill");
const $statusLabel = $statusPill ? $statusPill.querySelector(".label") : null;

const WAKE_RE = /\b(okay|ok)[\s,]+(claude|clawd|claud|cloud|clyde|clod|claud[oe])\b/i;
const SILENCE_MS = 1500;            // how long to wait after wake before submitting
const ECHO_TAIL_MS = 800;            // ignore SR for this long after TTS audio ends
const RESTART_DELAY_MS = 250;        // backoff before restarting after onend
const TRANSCRIPT_MAX_AGE_MS = 5 * 60 * 1000;   // 5 minutes of room context
const TRANSCRIPT_MAX_ENTRIES = 80;             // hard cap so prompts don't bloat

let _recog = null;
let _wakeArmed = false;       // wake word heard; capturing the prompt
let _wakeBuf = "";            // accumulated post-wake-word transcript
let _silenceTimer = null;
let _restartTimer = null;
let _lastSpokeTs = 0;         // Date.now() of last TTS audio activity (echo gate)
let _wakeManuallyPaused = false;  // user clicked the mic to take over

// Rolling room transcript — every finalized SR chunk lands here (gated by
// the echo window so clawd's own voice isn't captured as user speech).
// When the wake word fires we prepend this buffer to the prompt so clawd
// can answer "what's the magic number?" by looking at what was said earlier.
const _transcript = [];
// What's currently being said but hasn't finalized yet. Updates many times
// per second while you speak, then clears when the chunk finalizes. Only
// used for live UI feedback; never sent to clawd.
let _liveInterim = "";

function pushTranscript(text) {
  text = (text || "").trim();
  if (!text) return;
  _transcript.push({ ts: Date.now(), text });
  trimTranscript();
  renderTranscriptOverlay();
}

function trimTranscript() {
  const cutoff = Date.now() - TRANSCRIPT_MAX_AGE_MS;
  while (_transcript.length && _transcript[0].ts < cutoff) _transcript.shift();
  while (_transcript.length > TRANSCRIPT_MAX_ENTRIES) _transcript.shift();
}

function buildTranscriptContext() {
  trimTranscript();
  if (!_transcript.length) return "";
  const now = Date.now();
  const lines = _transcript.map(e => {
    const ago = Math.max(0, Math.round((now - e.ts) / 1000));
    return `[${ago}s ago] ${e.text}`;
  });
  return [
    "Recent room transcript (mic-derived, may contain mishearings; most recent at bottom):",
    ...lines.map(l => "  " + l),
    "",
  ].join("\n");
}

function setPillState(state, label) {
  if (!$statusPill) return;
  $statusPill.classList.remove("listening", "armed", "speaking", "thinking", "error");
  $statusPill.classList.add(state);
  if (label && $statusLabel) $statusLabel.textContent = label;
}

function inEchoWindow() {
  if (_ttsAudio) return true;
  return _lastSpokeTs && (Date.now() - _lastSpokeTs) < ECHO_TAIL_MS;
}

function startWakeRecog() {
  if (_recog) return;
  if (_wakeManuallyPaused) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setPillState("error", "speech recognition unsupported (use Chrome)");
    console.warn("SpeechRecognition unavailable — wake word disabled.");
    return;
  }
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = "en-US";

  r.onstart = () => {
    // Only repaint pill/avatar if nothing else is going on. The recognizer
    // restarts every ~30s under Chrome — we mustn't yank the avatar out of
    // chatting/thinking mid-turn.
    if (_wakeArmed) return;
    if (_ttsAudio) return;
    const tab = (typeof currentTab === "function") ? currentTab() : null;
    if (tab && tab.activeRunId) return;
    setPillState("listening", 'listening for "okay claude"');
  };

  r.onresult = (e) => {
    if (inEchoWindow()) return;
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      if (res.isFinal) handleFinalChunk(res[0].transcript);
      else interim += res[0].transcript;
    }
    _liveInterim = interim.trim();
    renderTranscriptOverlay();
  };

  r.onerror = (e) => {
    // "no-speech" / "aborted" / "audio-capture" etc. are routine — let onend handle restart.
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      setPillState("error", "microphone permission denied");
      _wakeManuallyPaused = true;
    } else if (e.error !== "aborted" && e.error !== "no-speech") {
      console.warn("[wake] SR error:", e.error);
    }
  };

  r.onend = () => {
    _recog = null;
    if (_wakeManuallyPaused) return;
    clearTimeout(_restartTimer);
    _restartTimer = setTimeout(startWakeRecog, RESTART_DELAY_MS);
  };

  _recog = r;
  try { r.start(); }
  catch (e) {
    // Chrome throws if start() is called too quickly after a previous stop.
    _recog = null;
    clearTimeout(_restartTimer);
    _restartTimer = setTimeout(startWakeRecog, RESTART_DELAY_MS);
  }
}

function stopWakeRecog() {
  clearTimeout(_restartTimer);
  if (_recog) { try { _recog.stop(); } catch {} _recog = null; }
}

function armSilenceTimer() {
  clearTimeout(_silenceTimer);
  _silenceTimer = setTimeout(submitWakeBuffer, SILENCE_MS);
}

function submitWakeBuffer() {
  const prompt = _wakeBuf.trim();
  _wakeArmed = false;
  _wakeBuf = "";
  clearTimeout(_silenceTimer);
  if (!prompt) {
    setPillState("listening", 'listening for "okay claude"');
    return;
  }
  // Build the message we send to clawd: rolling room transcript on top,
  // then the explicit question the wake-word phrase introduced. Clawd
  // sees the conversational context and can back-reference earlier
  // utterances ("what was the magic number?").
  const ctx = buildTranscriptContext();
  const composed = ctx
    ? `${ctx}\n[just now, addressed to you]: ${prompt}`
    : prompt;
  $input.value = composed;
  autosize($input);
  setPillState("thinking", "thinking…");
  onSend();
}

function handleFinalChunk(rawText) {
  const text = (rawText || "").trim();
  if (!text) return;
  // Always capture into the rolling transcript so clawd has context for
  // back-references like "what's the magic number?". Inserted regardless
  // of whether this chunk contains the wake word.
  pushTranscript(text);
  if (!_wakeArmed) {
    const m = text.match(WAKE_RE);
    if (!m) return;
    const after = text.slice(m.index + m[0].length).trim();
    _wakeArmed = true;
    _wakeBuf = after;
    setPillState("armed", after ? "heard you — go on…" : "yes?");
    clawdVid.listening();
    armSilenceTimer();
    return;
  }
  // Already armed — append to buffer and reset silence timer.
  _wakeBuf = (_wakeBuf ? _wakeBuf + " " : "") + text;
  setPillState("armed", "go on…");
  armSilenceTimer();
}

// ── Pill state poller ─────────────────────────────────────────────────────
// We recompute the pill state continuously from observed signals
// (_ttsAudio, tab.activeRunId, state.connected, _wakeArmed) so the pill
// always reflects reality — no stuck "thinking" if a run completes without
// TTS, no missed transitions, and we surface gateway disconnects loudly.
setInterval(() => {
  if (_ttsAudio) _lastSpokeTs = Date.now();
  if (_wakeArmed) return;   // armed state is set imperatively in handleFinalChunk
  const echoTail = _lastSpokeTs && (Date.now() - _lastSpokeTs < ECHO_TAIL_MS);
  const speaking = !!_ttsAudio || echoTail;
  const tab = (typeof currentTab === "function") ? currentTab() : null;
  const running = tab && tab.activeRunId;
  const connected = !!(state && state.connected);

  if (speaking) {
    setPillState("speaking", "clawd speaking…");
  } else if (!connected) {
    setPillState("error", "gateway disconnected");
  } else if (running) {
    setPillState("thinking", "thinking…");
  } else {
    setPillState("listening", 'listening for "okay claude"');
  }
}, 200);

// ── Diagnostics shortcut ──────────────────────────────────────────────────
// Press D to dump connection/wake state to the console — easier than fishing
// through __clawdState in devtools while debugging on a Zoom rehearsal.
window.addEventListener("keydown", (e) => {
  if (e.key !== "D" || !e.shiftKey || e.metaKey || e.ctrlKey) return;
  const tab = (typeof currentTab === "function") ? currentTab() : null;
  console.log("[clawd-video-chat]", {
    connected: !!(state && state.connected),
    wsUrl: state && state.config && state.config.wsUrl,
    sessionKey: tab && tab.sessionKey,
    activeRunId: tab && tab.activeRunId,
    wakeArmed: _wakeArmed,
    wakeBuf: _wakeBuf,
    ttsAudio: !!_ttsAudio,
    ttsEnabled: _ttsEnabled,
    ttsMode: _ttsMode,
    recogAlive: !!_recog,
    paused: _wakeManuallyPaused,
  });
});

// ── Live diagnostic chip (top-left in OBS mode) ──────────────────────────
// Shows _ttsMode + connection + whether audio is currently playing. Updates
// every 500ms. Visible without DevTools so we can debug from a screenshot.
const $diagChip = document.getElementById("diag-chip");
if ($diagChip) {
  setInterval(() => {
    const conn = !!(state && state.connected);
    $diagChip.textContent =
      `tts=${_ttsMode}` +
      ` · ws=${conn ? "ok" : "down"}` +
      (_ttsAudio ? " · speaking" : "");
    $diagChip.style.color = (_ttsMode === "elevenlabs" || _ttsMode === "openai")
      ? "rgba(52,238,182,0.9)"   // green-ish — good
      : "rgba(229,90,43,0.95)";  // red-ish — fallback
  }, 500);
}

// ── OBS-mode model picker (opus / sonnet / kimi) ──────────────────────────
// Reuses the existing dev-mode picker plumbing: clicking a button updates
// currentTab().selectedModel, persists to localStorage under "clawd.model",
// and the next onSend fires ensureModelSelected which sends `/model <name>`
// to the gateway. No gateway restart needed — openclaw routes the per-session
// override at the next turn.
const _modelPicker = document.querySelector("#stats-chip .model-picker");
function refreshModelPickerActive() {
  if (!_modelPicker) return;
  const active = (typeof currentTab === "function" && currentTab())
    ? currentTab().selectedModel
    : (localStorage.getItem("clawd.model") || window.__stats.model);
  _modelPicker.querySelectorAll("button").forEach(b => {
    b.classList.toggle("active", b.dataset.model === active);
  });
}
if (_modelPicker) {
  _modelPicker.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-model]");
    if (!btn) return;
    const newModel = btn.dataset.model;
    const tab = (typeof currentTab === "function") ? currentTab() : null;
    if (tab) tab.selectedModel = newModel;
    localStorage.setItem("clawd.model", newModel);
    window.__stats.model = newModel;
    refreshModelPickerActive();
    renderStatsChip();
    if (typeof saveTabs === "function") saveTabs();
    console.log("%c[clawd] model switch queued", "color:#34eeb6", newModel,
                "— takes effect on next 'okay claude' turn");
  });
}
// Refresh on a loose interval since boot() runs after this code and sets
// currentTab() lazily. Cheap.
setInterval(refreshModelPickerActive, 1000);

// ── Big red toast when speechSynthesis fires (browser TTS fallback) ──────
const $fallbackToast = document.getElementById("fallback-toast");
let _fallbackToastTimer = null;
function flashBrowserFallbackWarning() {
  if (!$fallbackToast) return;
  $fallbackToast.classList.add("show");
  clearTimeout(_fallbackToastTimer);
  _fallbackToastTimer = setTimeout(() => {
    $fallbackToast.classList.remove("show");
  }, 10000);
}

// ── Rolling transcript overlay renderer ─────────────────────────────────
const $transcriptRows = document.querySelector("#transcript-overlay .transcript-rows");
const $transcriptEntries = document.querySelector("#transcript-overlay .t-entries");
const $transcriptWords = document.querySelector("#transcript-overlay .t-words");

function countWords(text) {
  if (!text) return 0;
  const m = text.match(/\S+/g);
  return m ? m.length : 0;
}
function countTranscriptWords() {
  let n = 0;
  for (const e of _transcript) n += countWords(e.text);
  return n;
}

const $pillWc = document.querySelector("#status-pill .wc");
let _wcPulseTimer = null;
function renderTranscriptOverlay() {
  // Always update the badge counts (even when the overlay is hidden) so
  // toggling ?transcript=1 mid-session shows accurate numbers immediately.
  // Word count includes the live in-flight interim so it grows in real time
  // as you speak — that's the "I know it's listening" feedback.
  const finalCount = countTranscriptWords();
  const interimCount = countWords(_liveInterim);
  const total = finalCount + interimCount;
  if ($transcriptEntries) $transcriptEntries.textContent = _transcript.length + (interimCount ? "+" : "");
  if ($transcriptWords) $transcriptWords.textContent = interimCount ? `${total} (+${interimCount})` : String(total);
  // Bottom-center pill — visible in OBS mode. Update every render so the
  // number grows as you speak.
  if ($pillWc) {
    $pillWc.textContent = `(${total})`;
    if (interimCount > 0) {
      $pillWc.classList.add("growing");
      clearTimeout(_wcPulseTimer);
      _wcPulseTimer = setTimeout(() => $pillWc.classList.remove("growing"), 700);
    }
  }
  if (!$transcriptRows) return;
  if (!document.body.classList.contains("show-transcript")) return;
  // Only render last 20 entries — older ones still in buffer but UI stays tight.
  const escape = (s) => s.replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));
  const now = Date.now();
  const recent = _transcript.slice(-20);
  let html = recent.map(e => {
    const ago = Math.max(0, Math.round((now - e.ts) / 1000));
    const ageLabel = ago < 60 ? `${ago}s` : `${Math.round(ago / 60)}m`;
    return `<div class="row"><span class="age">${ageLabel}</span>${escape(e.text)}</div>`;
  }).join("");
  if (_liveInterim) {
    html += `<div class="row" style="opacity:0.6;font-style:italic"><span class="age">…</span>${escape(_liveInterim)}</div>`;
  }
  $transcriptRows.innerHTML = html;
}
// Refresh age labels (and trim aged-out entries) every 5s even with no new chunks.
setInterval(() => { trimTranscript(); renderTranscriptOverlay(); }, 5000);

// ── Manual mic button (fallback) ──────────────────────────────────────────
// In dev mode the mic button toggles wake-word listening on/off so you can
// silence the loop temporarily.
if ($btnMic) {
  $btnMic.addEventListener("click", () => {
    if (_wakeManuallyPaused) {
      _wakeManuallyPaused = false;
      $btnMic.classList.remove("recording");
      startWakeRecog();
      setPillState("listening", 'listening for "okay claude"');
    } else {
      _wakeManuallyPaused = true;
      $btnMic.classList.add("recording");
      $btnMic.title = "wake-word paused — click to resume";
      stopWakeRecog();
      setPillState("error", "wake-word paused");
    }
  });
}

// SSE — keep the events stream alive (the server still emits toggle-mic /
// toggle-view from POST /trigger-* endpoints). We only honor toggle-mic to
// pause/resume wake-word listening; the other triggers are no-ops here.
try {
  const _wakeEvents = new EventSource("/events");
  _wakeEvents.onmessage = (e) => {
    if (e.data === "toggle-mic" && $btnMic) $btnMic.click();
  };
} catch (e) { /* SSE optional */ }

// ── Model picker ───────────────────────────────────────────────────────────
function initModelPicker() {
  const sel = document.getElementById("modelPicker");
  const tab = currentTab();
  if (tab) {
    if ([...sel.options].some(o => o.value === tab.selectedModel)) sel.value = tab.selectedModel;
    else { sel.value = DEFAULT_MODEL; tab.selectedModel = DEFAULT_MODEL; }
  }
  sel.addEventListener("change", () => {
    const t = currentTab();
    if (!t) return;
    t.selectedModel = sel.value;
    saveTabs();
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  // Settings/auth config
  const stored = localStorage.getItem("clawd.config");
  if (stored) {
    try {
      const cfg = JSON.parse(stored);
      // Drop legacy sessionKey field — sessions live on tabs now
      delete cfg.sessionKey;
      state.config = cfg;
    } catch {}
  }
  if (!state.config?.wsUrl || !state.config?.token) {
    try {
      const resp = await fetch("/config");
      const cfg = await resp.json();
      state.config = state.config || {};
      if (!state.config.wsUrl) state.config.wsUrl = cfg.wsUrl;
      if (!state.config.token) state.config.token = cfg.token;
      if (!state.config.bankrKey && cfg.bankrKey) state.config.bankrKey = cfg.bankrKey;
      _ttsMode = (cfg.ttsBackend && cfg.ttsBackend !== "none") ? cfg.ttsBackend : "browser";
      console.log("[tts] backend:", _ttsMode);
      if (cfg.model) { window.__stats.model = cfg.model; renderStatsChip(); }
      applyTtsState();
    } catch (e) { console.warn("no /config endpoint", e); }
  } else {
    // We had cached config in localStorage; still ask the server whether OpenAI TTS is available.
    try {
      const resp = await fetch("/config");
      const cfg = await resp.json();
      _ttsMode = (cfg.ttsBackend && cfg.ttsBackend !== "none") ? cfg.ttsBackend : "browser";
      console.log("[tts] backend:", _ttsMode);
      if (cfg.model) { window.__stats.model = cfg.model; renderStatsChip(); }
      applyTtsState();
    } catch {}
  }
  if (!state.config?.wsUrl) state.config = { ...(state.config || {}), wsUrl: "ws://127.0.0.1:18789" };
  if (!state.config.token) {
    setStatus("bad", "no token — open settings");
    openSettings();
    return;
  }

  // Initialize tabs (restore from storage or seed default)
  const restored = loadTabsFromStorage();
  if (restored && restored.length) {
    state.tabs = restored;
    for (const t of state.tabs) $transcript.appendChild(t.paneEl);
    const savedActive = localStorage.getItem("clawd.activeTab");
    state.activeTabId = (savedActive && state.tabs.find(t => t.id === savedActive)) ? savedActive : state.tabs[0].id;
  } else {
    const tab = makeTab({
      id: "ui-" + shortHex(6),
      sessionKey: "agent:clawd:main",
      displayName: "new chat 1",
      selectedModel: localStorage.getItem("clawd.model") || DEFAULT_MODEL,
    });
    state.tabs.push(tab);
    $transcript.appendChild(tab.paneEl);
    state.activeTabId = tab.id;
    saveTabs();
  }
  state.tabs.forEach(t => t.paneEl.classList.toggle("active", t.id === state.activeTabId));
  renderTabs();
  initModelPicker();
  // Restore composer draft for the active tab
  const _activeTab = currentTab();
  if (_activeTab) {
    $input.value = loadDraft(_activeTab);
    autosize($input);
  }
  connect();
}

window.__clawdState = state;

// One initial pull so the stats chip shows whatever's already in the session
// (in case the user reloaded mid-conversation). countCost:false because we
// don't know which model / which provider previously generated those tokens,
// so crediting their cost to this page-load would be misleading.
setTimeout(() => fetchSessionStats({ countCost: false }), 1500);

// ── clawd-video-chat boot extras ───────────────────────────────────────────
// 1) ?dev=1 in the URL drops OBS mode and reveals the full chat UI for debugging.
// 2) ?nostatus=1 hides the status pill (cleaner OBS feed).
// 3) TTS is force-enabled by default — the whole point of this build is voice.
// 4) An "audio unlock" overlay covers the page until the user clicks. Chrome's
//    autoplay policy blocks HTMLMediaElement.play() until the page has received
//    a real user gesture — mic permission does NOT count. The overlay click is
//    that gesture; we ALSO play a silent Audio element inside the handler so
//    Chrome's gesture token is bound to audio playback, not just the page.
(function initVideoChat() {
  const params = new URLSearchParams(location.search);
  if (params.has("dev")) document.body.classList.remove("obs");
  if (params.has("nostatus")) document.body.classList.add("hide-status");
  // Show the rolling room transcript overlay (top-right). Defaults on in
  // dev mode; toggle with ?transcript=1 / ?transcript=0 to override.
  const wantTranscript = params.has("transcript")
    ? params.get("transcript") !== "0"
    : params.has("dev");
  if (wantTranscript) document.body.classList.add("show-transcript");

  // Force TTS on for video-chat — there's no fallback UI to click 🔊.
  if (!_ttsEnabled) {
    _ttsEnabled = true;
    localStorage.setItem("clawd.tts", "1");
    applyTtsState();
  }

  const $unlock = document.getElementById("audio-unlock");
  let unlocked = false;

  function unlockAudioAndStart() {
    if (unlocked) return;
    unlocked = true;
    // Play a 1-sample silent WAV inside this gesture so Chrome's autoplay
    // policy registers that the page has audio permission. Future Audio
    // elements (the ElevenLabs blobs) will then play without prompting.
    try {
      const silent = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
      silent.volume = 0.01;
      silent.play().then(() => silent.pause()).catch(e => console.warn("[clawd] silent unlock failed:", e.message));
    } catch (e) { console.warn("[clawd] silent unlock threw:", e); }

    // Hide the overlay and start the wake-word recognizer.
    if ($unlock) {
      $unlock.classList.add("dismissed");
      setTimeout(() => { try { $unlock.remove(); } catch {} }, 500);
    }
    startWakeRecog();
    console.log("%c[clawd] audio unlocked, wake-word recognizer started", "color:#34eeb6");
  }

  if ($unlock) {
    $unlock.addEventListener("click", unlockAudioAndStart, { once: true });
  } else {
    // Overlay missing (e.g. someone edited the HTML) — fall back to old behavior.
    ["click", "keydown", "touchstart"].forEach(ev =>
      window.addEventListener(ev, unlockAudioAndStart, { once: true, passive: true })
    );
  }
})();

boot();
</script>
</body>
</html>
